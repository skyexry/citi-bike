<svg width="100%" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #555; }
    .arr { stroke: #888; stroke-width: 1.5; fill: none; }
    .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
    .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
    .gray-fill { fill: #F1EFE8; stroke: #5F5E5A; }
    .blue-fill { fill: #E6F1FB; stroke: #185FA5; }
    .coral-fill { fill: #FAECE7; stroke: #993C1D; }
    .dashed-box { fill: none; stroke: #aaa; stroke-dasharray: 4 3; }
  </style>
</defs>

<!-- ── LAYER 0: Data Sources ── -->
<text class="ts" x="340" y="22" text-anchor="middle">Data sources</text>

<rect class="teal-fill" x="60" y="34" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="160" y="56" text-anchor="middle">Citi Bike S3</text>
<text class="ts" x="160" y="74" text-anchor="middle">Monthly trip CSVs</text>

<rect class="teal-fill" x="420" y="34" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="520" y="56" text-anchor="middle">NOAA CDO API</text>
<text class="ts" x="520" y="74" text-anchor="middle">Daily weather (GHCND)</text>

<!-- Arrows down to ingest / weather -->
<line x1="160" y1="86" x2="160" y2="148" class="arr" marker-end="url(#arrow)"/>
<line x1="520" y1="86" x2="520" y2="148" class="arr" marker-end="url(#arrow)"/>

<!-- ── LAYER 1: Ingestion ── -->
<text class="ts" x="340" y="140" text-anchor="middle">Ingestion</text>

<rect class="purple-fill" x="40" y="152" width="240" height="68" rx="8" stroke-width="0.5"/>
<text class="th" x="160" y="174" text-anchor="middle">pipeline/ingest.py</text>
<text class="ts" x="160" y="192" text-anchor="middle">Stage 1: file SHA-256 hash</text>
<text class="ts" x="160" y="208" text-anchor="middle">Stage 2: row-level trip_id dedup</text>

<rect class="purple-fill" x="400" y="152" width="240" height="68" rx="8" stroke-width="0.5"/>
<text class="th" x="520" y="174" text-anchor="middle">pipeline/weather.py</text>
<text class="ts" x="520" y="192" text-anchor="middle">Fetch + normalize</text>
<text class="ts" x="520" y="208" text-anchor="middle">TMAX, TMIN, PRCP, SNWD, AWND</text>

<!-- Arrows down to SQLite -->
<line x1="160" y1="220" x2="160" y2="285" class="arr" marker-end="url(#arrow)"/>
<line x1="520" y1="220" x2="520" y2="285" class="arr" marker-end="url(#arrow)"/>
<line x1="160" y1="308" x2="328" y2="308" class="arr" marker-end="url(#arrow)"/>
<line x1="520" y1="308" x2="372" y2="308" class="arr" marker-end="url(#arrow)"/>

<!-- ── LAYER 2: Warehouse ── -->
<text class="ts" x="340" y="278" text-anchor="middle">Warehouse</text>

<rect class="gray-fill" x="220" y="286" width="240" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="308" text-anchor="middle">db/citi_bike.db (SQLite)</text>
<text class="ts" x="340" y="326" text-anchor="middle">Append-only raw trips table</text>

<!-- Arrow down to transform -->
<line x1="340" y1="338" x2="340" y2="390" class="arr" marker-end="url(#arrow)"/>

<!-- ── LAYER 3: Transform ── -->
<text class="ts" x="340" y="382" text-anchor="middle">Transform</text>

<rect class="purple-fill" x="200" y="394" width="280" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="416" text-anchor="middle">pipeline/transform.py</text>
<text class="ts" x="340" y="434" text-anchor="middle">Aggregate analytics tables</text>

<!-- Arrows out to two analytics tables -->
<line x1="260" y1="446" x2="180" y2="496" class="arr" marker-end="url(#arrow)"/>
<line x1="420" y1="446" x2="500" y2="496" class="arr" marker-end="url(#arrow)"/>

<!-- ── LAYER 4: Analytics Tables ── -->
<text class="ts" x="340" y="490" text-anchor="middle">Analytics tables</text>

<rect class="blue-fill" x="40" y="500" width="260" height="68" rx="8" stroke-width="0.5"/>
<text class="th" x="170" y="522" text-anchor="middle">daily_rides_weather</text>
<text class="ts" x="170" y="540" text-anchor="middle">365 rows · ridership + weather</text>
<text class="ts" x="170" y="556" text-anchor="middle">Temporal &amp; weather analysis</text>

<rect class="blue-fill" x="380" y="500" width="260" height="68" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="522" text-anchor="middle">station_summary</text>
<text class="ts" x="510" y="540" text-anchor="middle">2,352 stations · net flow</text>
<text class="ts" x="510" y="556" text-anchor="middle">Rebalancing priority score</text>

<!-- Arrows down to export -->
<line x1="170" y1="568" x2="245" y2="618" class="arr" marker-end="url(#arrow)"/>
<line x1="510" y1="568" x2="435" y2="618" class="arr" marker-end="url(#arrow)"/>

<!-- ── LAYER 5: Export ── -->
<text class="ts" x="340" y="612" text-anchor="middle">Export</text>

<rect class="gray-fill" x="190" y="622" width="300" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="644" text-anchor="middle">data/processed/*.parquet</text>
<text class="ts" x="340" y="662" text-anchor="middle">Committed to repo · portable</text>

<!-- Arrow down to app -->
<line x1="340" y1="674" x2="340" y2="706" class="arr" marker-end="url(#arrow)"/>

<!-- ── LAYER 6: App ── -->
<rect class="coral-fill" x="190" y="708" width="300" height="20" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="722" text-anchor="middle">app.py — reads SQLite → fallback parquet</text>

<!-- Refresh pipeline annotation -->
<rect class="dashed-box" x="540" y="374" width="130" height="44" rx="6" stroke-width="0.5"/>
<text class="ts" x="605" y="392" text-anchor="middle">refresh_pipeline.py</text>
<text class="ts" x="605" y="408" text-anchor="middle">auto-detects new CSVs</text>
<line x1="540" y1="396" x2="484" y2="420" class="arr" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
</svg>
